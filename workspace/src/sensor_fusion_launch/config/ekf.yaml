ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true

    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom   # IMPORTANT: set to odom if you don't have global localization

    # Wheel odometry input
    odom0: /wheel/odometry
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # IMU input
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_queue_size: 50
    imu0_differential: false
    imu0_relative: true

    # If your IMU driver already removes gravity, leave false.
    # If it publishes raw linear accel with gravity included, set true.
    imu0_remove_gravitational_acceleration: true
